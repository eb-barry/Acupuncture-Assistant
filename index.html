<!DOCTYPE html>

<head>

<body>
<div id="app">

  <!-- ════════════════════════════════════════
       PAGE: 主頁 (Home)
  ═════════════════════════════════════════ -->

    <!-- Hero Header -->

                <!-- NE --> <line x1="41" y1="11" x2="36" y2="16"/>
                <!-- E -->  <line x1="49" y1="26" x2="42" y2="26"/>
                <!-- SE --> <line x1="41" y1="41" x2="36" y2="36"/>

            </svg>
          </div>
          <div class="card-text">
            <h3>靈龜八法與子午流注</h3>

          </div>
          <div class="card-chevron">

                 stroke-linecap="round" stroke-linejoin="round">

        </div>

        <div class="card card-row" id="btn-meridian" role="button" tabindex="0"

              <circle cx="26" cy="10" r="6" fill="rgba(74,154,170,0.25)" stroke="#4a9aaa" stroke-width="1.5"/>
              <path d="M18 20 Q26 16 34 20 L36 38 H30 L28 50 H24 L22 38 H16 Z"
                    fill="rgba(74,154,170,0.12)" stroke="#4a9aaa" stroke-width="1.5" stroke-linejoin="round"/>
              <line x1="18" y1="22" x2="12" y2="34" stroke="#4a9aaa" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="34" y1="22" x2="40" y2="34" stroke="#4a9aaa" stroke-width="1.5" stroke-linecap="round"/>
              <!-- meridian dots -->

              <circle cx="26" cy="31" r="2" fill="#4a9aaa" opacity="0.6"/>
              <circle cx="26" cy="38" r="2" fill="#4a9aaa" opacity="0.6"/>

          <div class="card-text">
            <h3>經絡與穴位</h3>

          <div class="card-chevron">

        </div>

        <div class="card card-row" id="btn-rhymes" role="button" tabindex="0"
             aria-label="中醫歌訣">
          <div class="card-icon">
            <!-- Book SVG -->

              <rect x="8" y="8" width="36" height="38" rx="4"
                    fill="rgba(74,154,170,0.1)" stroke="#2d7a8a" stroke-width="1.8"/>
              <line x1="26" y1="8" x2="26" y2="46" stroke="#2d7a8a" stroke-width="1.5" stroke-dasharray="2 2"/>

                    stroke-linecap="round" fill="none"/>
              <line x1="14" y1="22" x2="23" y2="22" stroke="#4a9aaa" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="14" y1="28" x2="23" y2="28" stroke="#4a9aaa" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="14" y1="34" x2="23" y2="34" stroke="#4a9aaa" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="29" y1="22" x2="38" y2="22" stroke="#4a9aaa" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="29" y1="28" x2="38" y2="28" stroke="#4a9aaa" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="29" y1="34" x2="38" y2="34" stroke="#4a9aaa" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="card-text">
            <h3>中醫歌訣</h3>
            <p>經典歌訣、快速查詢</p>

          <div class="card-chevron">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"

      <!-- Decorative ink-wash footer image area -->

              <stop offset="0%" stop-color="#4a9aaa" stop-opacity="0.18"/>

            <linearGradient id="mtnGrad2" x1="0" y1="0" x2="0" y2="1">

        </svg>

    </div>

    <!-- Settings button (floating bottom-right) -->

        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                 a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                 A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                 l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                 A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                 l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                 a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                 l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                 a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div><!-- /#page-home -->


  <!-- ════════════════════════════════════════
       PAGE: 靈龜八法
  ═════════════════════════════════════════ -->

    <div class="top-bar">

      <span class="page-title">靈龜八法</span>
      <div style="width:36px"></div>
    </div>
    <div class="scroll-area" id="lingui-scroll">
      <!-- Dynamically rendered by lingui.js -->

    </div>

  <!-- ════════════════════════════════════════
       PAGE: 經絡與穴位
  ═════════════════════════════════════════ -->
  <div class="page" id="page-meridian">
    <div class="top-bar">
      <button class="btn-icon" id="back-meridian" aria-label="返回主頁">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="page-title">經絡與穴位</span>
      <div style="width:36px"></div>
    </div>

      <div id="meridian-content"></div>
      <div class="safe-bottom"></div>
    </div>
  </div>


  <!-- ════════════════════════════════════════
       PAGE: 中醫歌訣
  ═════════════════════════════════════════ -->
  <div class="page" id="page-rhymes">
    <div class="top-bar">
      <button class="btn-icon" id="back-rhymes" aria-label="返回主頁">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="page-title">中醫歌訣</span>
      <div style="width:36px"></div>
    </div>
    <div class="scroll-area" id="rhymes-scroll">
      <div id="rhymes-content"></div>
      <div class="safe-bottom"></div>
    </div>
  </div>


  <!-- ════════════════════════════════════════
       PAGE: 設定
  ═════════════════════════════════════════ -->
  <div class="page" id="page-settings">
    <div class="top-bar">
      <button class="btn-icon" id="back-settings" aria-label="返回主頁">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="page-title">設定</span>
      <div style="width:36px"></div>
    </div>
    <div class="scroll-area">
      <div class="flex-col gap-lg">

        <div>
          <p class="section-title">顯示</p>
          <div class="settings-section">
            <div class="settings-row">
              <div class="settings-row-label">
                介面字型大小
                <small>調整按鈕、選單等 UI 文字</small>
              </div>
              <div class="font-size-picker" id="font-size-picker">
                <button data-size="small"  title="小">小</button>
                <button data-size="medium" title="中">中</button>
                <button data-size="large"  title="大">大</button>
              </div>
            </div>
            <div class="settings-row">
              <div class="settings-row-label">
                說明文字大小
                <small>穴位主治、取穴等說明的字型</small>
              </div>
              <div class="font-size-picker" id="desc-size-picker">
                <button data-desc="normal" title="標準">標準</button>
                <button data-desc="large"  title="大">大</button>
                <button data-desc="xlarge" title="特大">特大</button>
              </div>
            </div>
          </div>
        </div>

        <div>
          <p class="section-title">語音</p>
          <div class="settings-section">
            <div class="settings-row">
              <div class="settings-row-label">
                TTS 聲音
                <small>朗讀歌訣時的聲音性別</small>
              </div>
              <div class="voice-picker" id="voice-picker">
                <button data-voice="female">女聲</button>
                <button data-voice="male">男聲</button>
              </div>
            </div>
            <div class="settings-row">
              <div class="settings-row-label">
                語音測試
                <small>點擊試聽目前設定</small>
              </div>

                試聽

          </div>
        </div>

        <div>
          <p class="section-title">關於</p>
          <div class="settings-section">
            <div class="settings-row">
              <div class="settings-row-label">
                針灸助理
                <small>版本 1.0.0</small>
              </div>
            </div>
          </div>
        </div>

      </div>
      <div class="safe-bottom"></div>

</div><!-- /#app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ── Styles for home page hero (page-specific) ── -->
<style>
.home-hero {
  position: relative;
  padding: 48px var(--sp-lg) var(--sp-xl);
  text-align: center;
  overflow: hidden;
  flex-shrink: 0;
}
.home-hero-bg {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,
    rgba(184,221,230,0.45) 0%,
    rgba(238,244,247,0.0) 100%);
  pointer-events: none;
}
.home-hero-content { position: relative; z-index: 1; }
.home-logo { margin-bottom: var(--sp-md); }
.yinyang-svg {
  width: 72px; height: 72px;
  filter: drop-shadow(0 4px 12px rgba(74,154,170,0.25));
  animation: floatLogo 4s ease-in-out infinite;
}
@keyframes floatLogo {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
.home-title {
  font-family: var(--font-serif);
  font-size: var(--fs-2xl);
  font-weight: 700;
  color: var(--clr-ink);
  letter-spacing: 0.12em;
  margin-bottom: var(--sp-sm);
}
.home-subtitle {
  font-size: var(--fs-sm);
  color: var(--clr-muted);
  letter-spacing: 0.15em;
}

.home-cards-area { padding-top: var(--sp-md); }

.home-footer-art {
  margin-top: var(--sp-xl);
  width: 100%; height: 160px;
  overflow: hidden;
  opacity: 0.85;
}
.home-footer-art svg { width: 100%; height: 100%; }

/* Settings FAB */
.btn-settings-fab {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom) + 20px);
  right: calc((100vw - min(100vw, var(--max-width))) / 2 + 20px);
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(245,249,251,0.9);
  border: var(--border);
  box-shadow: var(--shadow-md);
  color: var(--clr-teal);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: all var(--dur-fast);
  z-index: 90;
}
.btn-settings-fab:hover { background: var(--clr-teal-light); }
.btn-settings-fab svg { width: 20px; height: 20px; }

/* FAB visibility controlled by JS */
</style>

<!-- ── Scripts ── -->
<script src="js/settings.js"></script>
<script src="js/cache.js"></script>
<script src="js/ganzhi.js"></script>
<script src="js/ui.js"></script>
<script src="js/lingui.js"></script>
<script src="js/meridian.js"></script>
<script src="js/rhymes.js"></script>

<script>
// ── App Bootstrap ──
(function() {
  // Apply saved settings immediately
  Settings.apply();

  // ── Navigation ──
  const fab = document.getElementById('btn-settings');
  function nav(pageId) {
    UI.showPage(pageId);
    // 只在主頁顯示設定按鈕
    fab.style.display = (pageId === 'page-home') ? 'flex' : 'none';
  }

  document.getElementById('btn-lingui').addEventListener('click',   () => { nav('page-lingui');   Lingui.init(); });
  document.getElementById('btn-meridian').addEventListener('click', () => { nav('page-meridian'); Meridian.init(); });
  document.getElementById('btn-rhymes').addEventListener('click',   () => { nav('page-rhymes');   Rhymes.init(); });
  document.getElementById('btn-settings').addEventListener('click', () => { nav('page-settings'); initSettings(); });

  document.getElementById('back-lingui').addEventListener('click',   () => nav('page-home'));
  document.getElementById('back-meridian').addEventListener('click', () => nav('page-home'));
  document.getElementById('back-rhymes').addEventListener('click',   () => { Rhymes.stop(); nav('page-home'); });
  document.getElementById('back-settings').addEventListener('click', () => nav('page-home'));

  // Keyboard accessibility for card-rows
  document.querySelectorAll('.card-row[role=button]').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') el.click(); });
  });

  // ── Settings Page ──
  function initSettings() {
    const prefs = Settings.load();

    // 介面字型大小
    document.querySelectorAll('#font-size-picker button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.size === prefs.fontSize);
      btn.addEventListener('click', () => {
        Settings.set('fontSize', btn.dataset.size);
        document.querySelectorAll('#font-size-picker button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        UI.toast('介面字型已更新');
      });
    });

    // 說明文字大小
    document.querySelectorAll('#desc-size-picker button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.desc === prefs.descSize);
      btn.addEventListener('click', () => {
        Settings.set('descSize', btn.dataset.desc);
        document.querySelectorAll('#desc-size-picker button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        UI.toast('說明文字大小已更新');
      });
    });

    // Voice picker
    document.querySelectorAll('#voice-picker button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.voice === prefs.voiceGender);
      btn.addEventListener('click', () => {
        Settings.set('voiceGender', btn.dataset.voice);
        document.querySelectorAll('#voice-picker button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        UI.toast('聲音設定已更新');
      });
    });

    // TTS test
    document.getElementById('btn-tts-test').addEventListener('click', () => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance('針灸助理，全人醫療，調和陰陽。');
        utt.lang = 'zh-TW';
        const gender = Settings.get('voiceGender');
        const voices = window.speechSynthesis.getVoices();
        const picked = voices.find(v => v.lang.startsWith('zh') && (gender === 'female' ? /female|woman|girl/i.test(v.name) : /male|man/i.test(v.name)))
                    || voices.find(v => v.lang.startsWith('zh'))
                    || null;
        if (picked) utt.voice = picked;
        window.speechSynthesis.speak(utt);
      } else {
        UI.toast('您的裝置不支援語音功能');
      }
    });
  }

})();
  // ── Service Worker (PWA offline support) ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(err => console.warn('SW registration failed:', err));
    });
  }

</script>
</body>
</html>
