<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#eef4f7" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>針灸助理</title>
  <link rel="stylesheet" href="css/style.css" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

</head>
<body>
<div id="app">

  <!-- ════════════════════════════════════════
       PAGE: 主頁 (Home)
  ═════════════════════════════════════════ -->
  <div class="page active" id="page-home">
    <div class="home-image-wrap">

      <!-- 主選單背景圖 -->
      <img src="assets/main-menu.webp"
           alt="針灸助理主選單"
           class="home-bg-img"
           draggable="false" />

      <!-- 靈龜八法 -->
      <button class="home-hit-area" id="btn-lingui"
              style="top:27%;left:5%;width:90%;height:11%;"
              aria-label="靈龜八法與子午流注"></button>

      <!-- 經絡與穴位 -->
      <button class="home-hit-area" id="btn-meridian"
              style="top:39%;left:5%;width:90%;height:22%;"
              aria-label="經絡與穴位"></button>

      <!-- 中醫歌訣 -->
      <button class="home-hit-area" id="btn-rhymes"
              style="top:71%;left:5%;width:90%;height:10%;"
              aria-label="中醫歌訣"></button>

      <!-- 設定齒輪 -->
      <button class="home-hit-area" id="btn-settings"
              style="top:86%;left:68%;width:27%;height:9%;"
              aria-label="設定"></button>

    </div>
  </div><!-- /#page-home -->


  <!-- ════════════════════════════════════════
       PAGE: 靈龜八法
  ═════════════════════════════════════════ -->
  <div class="page" id="page-lingui">
    <div class="top-bar">
      <button class="btn-home" id="back-lingui" aria-label="返回主頁">
        <img src="assets/home-icon.webp" alt="返回主頁" style="width:28px;height:28px;object-fit:contain;" />
      </button>
      <span class="page-title">靈龜八法</span>
      <div style="width:38px"></div>
    </div>
    <div class="scroll-area" id="lingui-scroll">
      <!-- Dynamically rendered by lingui.js -->
      <div id="lingui-content"></div>
      <div class="safe-bottom"></div>
    </div>
  </div>


  <!-- ════════════════════════════════════════
       PAGE: 經絡與穴位
  ═════════════════════════════════════════ -->
  <div class="page" id="page-meridian">
    <div class="top-bar">
      <button class="btn-home" id="back-meridian" aria-label="返回主頁">
        <img src="assets/home-icon.webp" alt="返回主頁" style="width:28px;height:28px;object-fit:contain;" />
      </button>
      <span class="page-title">經絡與穴位</span>
      <div style="width:38px"></div>
    </div>
    <div class="scroll-area" id="meridian-scroll">
      <div id="meridian-content"></div>
      <div class="safe-bottom"></div>
    </div>
  </div>


  <!-- ════════════════════════════════════════
       PAGE: 中醫歌訣
  ═════════════════════════════════════════ -->
  <div class="page" id="page-rhymes">
    <div class="top-bar">
      <button class="btn-home" id="back-rhymes" aria-label="返回主頁">
        <img src="assets/home-icon.webp" alt="返回主頁" style="width:28px;height:28px;object-fit:contain;" />
      </button>
      <span class="page-title">中醫歌訣</span>
      <div style="width:38px"></div>
    </div>
    <div class="scroll-area" id="rhymes-scroll">
      <div id="rhymes-content"></div>
      <div class="safe-bottom"></div>
    </div>
  </div>


  <!-- ════════════════════════════════════════
       PAGE: 設定
  ═════════════════════════════════════════ -->
  <div class="page" id="page-settings">
    <div class="top-bar">
      <button class="btn-home" id="back-settings" aria-label="返回主頁">
        <img src="assets/home-icon.webp" alt="返回主頁" style="width:28px;height:28px;object-fit:contain;" />
      </button>
      <span class="page-title">設定</span>
      <div style="width:38px"></div>
    </div>
    <div class="scroll-area">
      <div class="flex-col gap-lg">

        <div>
          <p class="section-title">顯示</p>
          <div class="settings-section">
            <div class="settings-row">
              <div class="settings-row-label">
                介面字型大小
                <small>調整按鈕、選單等 UI 文字</small>
              </div>
              <div class="font-size-picker" id="font-size-picker">
                <button data-size="small"  title="小">小</button>
                <button data-size="medium" title="中">中</button>
                <button data-size="large"  title="大">大</button>
              </div>
            </div>
            <div class="settings-row">
              <div class="settings-row-label">
                說明文字大小
                <small>穴位主治、取穴等說明的字型</small>
              </div>
              <div class="font-size-picker" id="desc-size-picker">
                <button data-desc="normal" title="標準">標準</button>
                <button data-desc="large"  title="大">大</button>
                <button data-desc="xlarge" title="特大">特大</button>
              </div>
            </div>
          </div>
        </div>

        <div>
          <p class="section-title">語音</p>
          <div class="settings-section">
            <div class="settings-row">
              <div class="settings-row-label">
                TTS 聲音
                <small>朗讀歌訣時的聲音性別</small>
              </div>
              <div class="voice-picker" id="voice-picker">
                <button data-voice="female">女聲</button>
                <button data-voice="male">男聲</button>
              </div>
            </div>
            <div class="settings-row">
              <div class="settings-row-label">
                語音測試
                <small>點擊試聽目前設定</small>
              </div>
              <button class="btn btn-secondary" id="btn-tts-test" style="font-size:var(--fs-sm);padding:8px 14px;">
                試聽
              </button>
            </div>
          </div>
        </div>

        <div>
          <p class="section-title">關於</p>
          <div class="settings-section">
            <div class="settings-row">
              <div class="settings-row-label">
                針灸助理
                <small>版本 1.0.0</small>
              </div>
            </div>
          </div>
        </div>

      </div>
      <div class="safe-bottom"></div>
    </div>
  </div>

</div><!-- /#app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ── Styles for home page hero (page-specific) ── -->
<style>
.home-hero {
  position: relative;
  padding: 48px var(--sp-lg) var(--sp-xl);
  text-align: center;
  overflow: hidden;
  flex-shrink: 0;
}
.home-hero-bg {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,
    rgba(184,221,230,0.45) 0%,
    rgba(238,244,247,0.0) 100%);
  pointer-events: none;
}
.home-hero-content { position: relative; z-index: 1; }
.home-logo { margin-bottom: var(--sp-md); }
.yinyang-svg {
  width: 72px; height: 72px;
  filter: drop-shadow(0 4px 12px rgba(74,154,170,0.25));
  animation: floatLogo 4s ease-in-out infinite;
}
@keyframes floatLogo {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
.home-title {
  font-family: var(--font-serif);
  font-size: var(--fs-2xl);
  font-weight: 700;
  color: var(--clr-ink);
  letter-spacing: 0.12em;
  margin-bottom: var(--sp-sm);
}
.home-subtitle {
  font-size: var(--fs-sm);
  color: var(--clr-muted);
  letter-spacing: 0.15em;
}

.home-cards-area { padding-top: var(--sp-md); }

.home-footer-art {
  margin-top: var(--sp-xl);
  width: 100%; height: 160px;
  overflow: hidden;
  opacity: 0.85;
}
.home-footer-art svg { width: 100%; height: 100%; }

/* Settings FAB */
.btn-settings-fab {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom) + 20px);
  right: calc((100vw - min(100vw, var(--max-width))) / 2 + 20px);
  width: 44px; height: 44px;
  border-radius: 50%;
  background: rgba(245,249,251,0.9);
  border: var(--border);
  box-shadow: var(--shadow-md);
  color: var(--clr-teal);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: all var(--dur-fast);
  z-index: 90;
}
.btn-settings-fab:hover { background: var(--clr-teal-light); }
.btn-settings-fab svg { width: 20px; height: 20px; }

/* FAB visibility controlled by JS */
</style>

<!-- ── Scripts ── -->
<script src="js/settings.js"></script>
<script src="js/cache.js"></script>
<script src="js/ganzhi.js"></script>
<script src="js/ui.js"></script>
<script src="js/lingui.js"></script>
<script src="js/meridian.js"></script>
<script src="js/rhymes.js"></script>

<script>
// ── App Bootstrap ──
(function() {
  // Apply saved settings immediately
  Settings.apply();

  // ── Navigation ──
  function nav(pageId) {
    UI.showPage(pageId);
  }

  document.getElementById('btn-lingui').addEventListener('click',   () => { nav('page-lingui');   Lingui.init(); });
  document.getElementById('btn-meridian').addEventListener('click', () => { nav('page-meridian'); Meridian.init(); });
  document.getElementById('btn-rhymes').addEventListener('click',   () => { nav('page-rhymes');   Rhymes.init(); });
  document.getElementById('btn-settings').addEventListener('click', () => { nav('page-settings'); initSettings(); });

  document.getElementById('back-lingui').addEventListener('click',   () => nav('page-home'));
  document.getElementById('back-meridian').addEventListener('click', () => nav('page-home'));
  document.getElementById('back-rhymes').addEventListener('click',   () => { Rhymes.stop(); nav('page-home'); });
  document.getElementById('back-settings').addEventListener('click', () => nav('page-home'));

  // Keyboard accessibility for card-rows
  document.querySelectorAll('.card-row[role=button]').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') el.click(); });
  });

  // ── Settings Page ──
  function initSettings() {
    const prefs = Settings.load();

    // 介面字型大小
    document.querySelectorAll('#font-size-picker button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.size === prefs.fontSize);
      btn.addEventListener('click', () => {
        Settings.set('fontSize', btn.dataset.size);
        document.querySelectorAll('#font-size-picker button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        UI.toast('介面字型已更新');
      });
    });

    // 說明文字大小
    document.querySelectorAll('#desc-size-picker button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.desc === prefs.descSize);
      btn.addEventListener('click', () => {
        Settings.set('descSize', btn.dataset.desc);
        document.querySelectorAll('#desc-size-picker button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        UI.toast('說明文字大小已更新');
      });
    });

    // Voice picker
    document.querySelectorAll('#voice-picker button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.voice === prefs.voiceGender);
      btn.addEventListener('click', () => {
        Settings.set('voiceGender', btn.dataset.voice);
        document.querySelectorAll('#voice-picker button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        UI.toast('聲音設定已更新');
      });
    });

    // TTS test
    document.getElementById('btn-tts-test').addEventListener('click', () => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance('針灸助理，全人醫療，調和陰陽。');
        utt.lang = 'zh-TW';
        const gender = Settings.get('voiceGender');
        const voices = window.speechSynthesis.getVoices();
        const picked = voices.find(v => v.lang.startsWith('zh') && (gender === 'female' ? /female|woman|girl/i.test(v.name) : /male|man/i.test(v.name)))
                    || voices.find(v => v.lang.startsWith('zh'))
                    || null;
        if (picked) utt.voice = picked;
        window.speechSynthesis.speak(utt);
      } else {
        UI.toast('您的裝置不支援語音功能');
      }
    });
  }

})();
  // ── Service Worker (PWA offline support) ──
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(err => console.warn('SW registration failed:', err));
    });
  }

</script>
</body>
</html>
